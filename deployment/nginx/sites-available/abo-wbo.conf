# ABO-WBO Production Site Configuration

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name abo-wbo.org www.abo-wbo.org api.abo-wbo.org;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name abo-wbo.org www.abo-wbo.org;
    root /var/www/html/public;
    index index.php index.html;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/abo-wbo.org.crt;
    ssl_certificate_key /etc/nginx/ssl/abo-wbo.org.key;
    include /etc/nginx/ssl/ssl.conf;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req zone=api burst=20 nodelay;
    limit_conn conn_limit_per_ip 20;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API endpoints with specific rate limiting
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Authentication endpoints with stricter rate limiting
    location ~ ^/(api/)?auth/(login|register) {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM configuration
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        
        # Production optimizations
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 4k;
        fastcgi_buffers 8 4k;
        fastcgi_busy_buffers_size 8k;
        fastcgi_temp_file_write_size 8k;
        
        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # Static file handling with long-term caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|pdf|doc|docx|xls|xlsx)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        access_log off;
        
        # CORS for fonts and assets
        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header Access-Control-Allow-Origin *;
        }
    }

    # Upload directory with restricted access
    location ^~ /uploads/ {
        alias /var/www/html/public/uploads/;
        
        # Prevent execution of PHP files in uploads directory
        location ~ \.php$ {
            deny all;
        }
        
        # Allow only specific file types
        location ~* \.(jpg|jpeg|png|gif|pdf|doc|docx|xls|xlsx|zip|rar|tar|gz)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
    }

    # Handle all other requests
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny access to sensitive files
    location ~ /\.(env|git|svn|htaccess|htpasswd) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to composer files
    location ~ ^/(composer\.(json|lock)|package\.json|webpack\.config\.js)$ {
        deny all;
        access_log off;
    }

    # Deny access to vendor directory via web
    location ^~ /vendor/ {
        deny all;
        access_log off;
    }

    # Deny access to storage directory via web
    location ^~ /storage/ {
        deny all;
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /var/www/html/public;
        internal;
    }
    
    location = /50x.html {
        root /var/www/html/public;
        internal;
    }
}

# API subdomain configuration
server {
    listen 443 ssl http2;
    server_name api.abo-wbo.org;
    root /var/www/html/public;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/api.abo-wbo.org.crt;
    ssl_certificate_key /etc/nginx/ssl/api.abo-wbo.org.key;
    include /etc/nginx/ssl/ssl.conf;

    # API-specific security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers for API
    add_header Access-Control-Allow-Origin "https://abo-wbo.org" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Mx-ReqToken, Keep-Alive, X-Requested-With, If-Modified-Since" always;
    add_header Access-Control-Allow-Credentials true always;

    # Handle preflight requests
    location ~* ^.+\.(OPTIONS)$ {
        add_header Access-Control-Allow-Origin "https://abo-wbo.org";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, User-Agent, DNT, Cache-Control, X-Mx-ReqToken, Keep-Alive, X-Requested-With, If-Modified-Since";
        add_header Access-Control-Allow-Credentials true;
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # API rate limiting
    limit_req zone=api burst=50 nodelay;
    limit_conn conn_limit_per_ip 10;

    # All requests go to API
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM configuration for API
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        
        # API optimizations
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 8k;
        fastcgi_buffers 16 8k;
        fastcgi_busy_buffers_size 16k;
    }

    # Health check for API
    location /health {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Deny access to non-API files
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|html)$ {
        return 404;
    }
}