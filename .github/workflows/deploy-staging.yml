name: Deploy to HostGator Staging

# Trigger: runs when you push to the 'develop' branch
# (You can change 'develop' to 'staging' or 'main' as needed)
on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      HOSTGATOR_HOST: ${{ secrets.HOSTGATOR_HOST }}
      HOSTGATOR_PORT: ${{ secrets.HOSTGATOR_PORT }}
      HOSTGATOR_USER: ${{ secrets.HOSTGATOR_USER }}
      HOSTGATOR_PATH: ${{ secrets.HOSTGATOR_PATH }}
    steps:
      # Step 1: Checkout your code into the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          set -eu

          required_vars="HOSTGATOR_HOST HOSTGATOR_PORT HOSTGATOR_USER HOSTGATOR_PATH"

          for var_name in $required_vars; do
            eval "var_value=\${$var_name}"
            if [ -z "$var_value" ]; then
              echo "Missing required GitHub Actions secret: $var_name" >&2
              exit 1
            fi
          done

      # Step 2: Install the SSH private key (from your secret)
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTGATOR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Add the server to known_hosts to avoid host key confirmation
          ssh-keyscan -p "$HOSTGATOR_PORT" "$HOSTGATOR_HOST" >> ~/.ssh/known_hosts

      # Step 3: Connect to HostGator and update the code
      - name: Deploy via Git pull
        run: |
          ssh -p "$HOSTGATOR_PORT" "$HOSTGATOR_USER@$HOSTGATOR_HOST" \
            'bash -s' -- "$HOSTGATOR_PATH" "$DEPLOY_BRANCH" "$REPO_URL" <<'EOF'
          set -eu

          TARGET_DIR_RAW="$1"
          DEPLOY_BRANCH="$2"
          REPO_URL="$3"

          case "$TARGET_DIR_RAW" in
            ~/*)
              TARGET_DIR="$HOME/${TARGET_DIR_RAW#~/}"
              ;;
            /*)
              TARGET_DIR="$TARGET_DIR_RAW"
              ;;
            *)
              TARGET_DIR="$HOME/$TARGET_DIR_RAW"
              ;;
          esac

          if [ ! -d "$TARGET_DIR" ] && [ -d "$HOME/staging.j-abo-wbo.org" ]; then
            TARGET_DIR="$HOME/staging.j-abo-wbo.org"
          fi

          if [ ! -d "$TARGET_DIR" ]; then
            echo "Resolved deployment directory does not exist on remote host." >&2
            echo "Checked path input: $TARGET_DIR_RAW" >&2
            echo "Resolved path: $TARGET_DIR" >&2
            exit 1
          fi

          cd "$TARGET_DIR"

          if [ -d .git ]; then
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
          elif [ -z "$(find . -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" .
          else
            echo "HOSTGATOR_PATH is not a git repository: $TARGET_DIR" >&2
            echo "Point HOSTGATOR_PATH at an existing git clone or empty the directory for the initial clone." >&2
            pwd >&2
            ls -la >&2
            exit 1
          fi

          echo "Deployment finished at $(date)"
          EOF
