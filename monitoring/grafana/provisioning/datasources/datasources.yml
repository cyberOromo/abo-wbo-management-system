apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: GET
    secureJsonData: {}

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "abo-wbo-logs-*"
    editable: true
    jsonData:
      timeField: "@timestamp"
      esVersion: "8.10.0"
      maxConcurrentShardRequests: 5
      logMessageField: "message"
      logLevelField: "level"
    secureJsonData: {}

  - name: MySQL
    type: mysql
    access: proxy
    url: mysql:3306
    database: abo_wbo_production
    user: grafana_reader
    editable: true
    jsonData:
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: "${MYSQL_GRAFANA_PASSWORD}"